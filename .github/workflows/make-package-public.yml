name: 'Make GHCR Package Public'

on:
  workflow_dispatch:

jobs:
  make-public:
    name: Change n8n package visibility to public
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${{ github.repository_owner }}"
          echo "Making ghcr.io/${OWNER}/n8n public..."
          echo "Token permissions check..."

          # First list packages to verify access
          echo "=== Listing org packages ==="
          curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/${OWNER}/packages?package_type=container" \
            -w "\nHTTP Status: %{http_code}\n"

          # Try to change visibility
          echo "=== Changing visibility ==="
          curl -X PATCH -v \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/${OWNER}/packages/container/n8n" \
            -d '{"visibility":"public"}' \
            -w "\nHTTP Status: %{http_code}\n" 2>&1

          echo "Done."
