name: 'Make GHCR Package Public'

on:
  workflow_dispatch:

jobs:
  make-public:
    name: Change n8n package visibility to public
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "Making ghcr.io/${OWNER}/n8n public..."

          # Use the GitHub API to change package visibility
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/${OWNER}/packages/container/n8n" \
            -d '{"visibility":"public"}' \
            -w "\nHTTP Status: %{http_code}\n"

          echo "Done. Verify at: https://github.com/orgs/${OWNER}/packages/container/n8n/settings"
